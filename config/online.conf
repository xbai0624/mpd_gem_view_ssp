# Online (ET) monitoring connection parameters.
# Read by the GUI when the "Online" button is pressed (only meaningful in a
# build made with: qmake CONFIG+=et).
#
# Format: one "key value" per line. Lines starting with # are ignored.

# ET system file name (as the ET system was started with)
et_file   /tmp/et_sys_gem

# host running the ET system
host      localhost

# ET system TCP server port
port      11111

# name of the monitoring station the GUI creates/attaches to
station   gem_monitor

# how often (milliseconds) the GUI polls ET for a new event
poll_ms   200
